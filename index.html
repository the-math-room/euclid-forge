<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Euclid Forge</title>
  </head>
  <body>
    <main id="app">
      <canvas id="geometry-canvas"></canvas>

      <aside id="help-overlay" aria-label="Euclid Forge controls">
        <strong>Euclid Forge</strong>
        <span>Click empty space: add point</span>
        <span>Drag point: move point</span>
        <span>Drag triangle: move triangle</span>
        <span>Shift-click points: select</span>
        <span>T: create triangle from 3 selected points</span>
        <span>G: create centroid for selected triangle</span>
      </aside>
    </main>

    <script type="module" src="/src/app/main.ts"></script>
  </body>
</html>
